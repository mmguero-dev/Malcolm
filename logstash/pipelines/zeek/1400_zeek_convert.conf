filter {

  # set data types for fields that belong to various zeek logs

  # convert all zeek "time" types (minus zeek.ts, which was done earlier)
  # https://docs.zeek.org/en/current/script-reference/types.html#type-time

  # How I got this list:
  #   for FILE in dashboards/templates/*.json dashboards/templates/composable/component/*.json; do gron "$FILE" | grep "zeek\." | grep 'type = "date"' ; done | sed "s/^.*\.zeek/zeek/" | sed "s/properties\.//g" | sed "s/\.type =.*//" | sort -u

  ruby {
    id => "ruby_zeek_unix_time_fields"
    tag_on_exception => "_rubyexception_zeek_unix_time_fields"
    init => '
        @zeek_time_fields = [
          "[zeek][files][ftime]",
          "[zeek][hart_ip][read_audit_log_last_security_change]",
          "[zeek][hart_ip][read_audit_log_power_up_time]",
          "[zeek][hart_ip_common_commands][set_real_time_clock_timestamp]",
          "[zeek][hart_ip_session_record][session_log_record_connect_time]",
          "[zeek][hart_ip_session_record][session_log_record_disconnect_time]",
          "[zeek][iec104_ctrl][actcon_ts]",
          "[zeek][iec104_ctrl][actterm_ts]",
          "[zeek][iec104_file][ts_end]",
          "[zeek][iec104_param][actcon_ts]",
          "[zeek][iec104_param][actterm_ts]",
          "[zeek][iec104_query][actcon_ts]",
          "[zeek][iec104_query][actterm_ts]",
          "[zeek][iec104_read][actcon_ts]",
          "[zeek][iec104_write][actcon_ts]",
          "[zeek][iec104_write][actterm_ts]",
          "[zeek][kerberos][from]",
          "[zeek][kerberos][till]",
          "[zeek][ntp][org_time]",
          "[zeek][ntp][rec_time]",
          "[zeek][ntp][ref_time]",
          "[zeek][ntp][xmt_time]",
          "[zeek][ocsp][nextUpdate]",
          "[zeek][ocsp][revoketime]",
          "[zeek][ocsp][thisUpdate]",
          "[zeek][omron_fins_detail][clock_time]",
          "[zeek][omron_fins_detail][date]",
          "[zeek][opcua_binary][req_hdr_timestamp]",
          "[zeek][opcua_binary][res_hdr_timestamp]",
          "[zeek][opcua_binary_aggregate_filter][revised_start_time]",
          "[zeek][opcua_binary_aggregate_filter][start_time]",
          "[zeek][opcua_binary_browse][browse_view_description_timestamp]",
          "[zeek][opcua_binary_opensecure_channel][sec_token_created_at]",
          "[zeek][opcua_binary_read_results][server_timestamp]",
          "[zeek][opcua_binary_read_results][source_timestamp]",
          "[zeek][opcua_binary_variant_data][variant_data_value_time]",
          "[zeek][opcua_binary_variant_data_value][server_timestamp]",
          "[zeek][opcua_binary_variant_data_value][source_timestamp]",
          "[zeek][opcua_binary_write][server_timestamp]",
          "[zeek][opcua_binary_write][source_timestamp]",
          "[zeek][pe][compile_ts]",
          "[zeek][roc_plus_historical_min_max_vals][time_of_max_value_occurrence]",
          "[zeek][roc_plus_historical_min_max_vals][time_of_min_value_occurrence]",
          "[zeek][roc_plus_historical_min_max_vals][time_of_yesterday_max_value]",
          "[zeek][roc_plus_historical_min_max_vals][time_of_yesterday_min_value]",
          "[zeek][roc_plus_realtime_clock][timestamp]",
          "[zeek][roc_plus_time_period_history_points][timestamp_for_index]",
          "[zeek][smb_files][times_accessed]",
          "[zeek][smb_files][times_changed]",
          "[zeek][smb_files][times_created]",
          "[zeek][smb_files][times_modified]",
          "[zeek][smb_files][ts]",
          "[zeek][snmp][up_since]",
          "[zeek][synchrophasor][header_time_stamp]",
          "[zeek][x509][certificate_not_valid_after]",
          "[zeek][x509][certificate_not_valid_before]",
        ]
      '
    code => '
      @zeek_time_fields.each do |field|
        val = event.get(field)
        next if val.nil?
        if val.to_f == 0.0
          event.remove(field)
        else
          event.set(field, LogStash::Timestamp.new(Time.at(val.to_f).utc))
        end
      end
    '
  }

  if ([zeek][intel][cif_firstseen]) {
    if ([zeek][intel][cif_firstseen] == "0.000000") {
      mutate { id => "mutate_remove_field_zeek_intel_cif_firstseen_zero"
               remove_field => [ "[zeek][intel][cif_firstseen]" ] }
    } else {
      date {
        id => "date_zeek_intel_cif_firstseen"
        match => [ "[zeek][intel][cif_firstseen]", "UNIX" ]
        target => "[threat][indicator][first_seen]"
        remove_field => [ "[zeek][intel][cif_firstseen]" ]
      }
    }
  }
  if ([zeek][intel][cif_lastseen]) {
    if ([zeek][intel][cif_lastseen] == "0.000000") {
      mutate { id => "mutate_remove_field_zeek_intel_cif_lastseen_zero"
               remove_field => [ "[zeek][intel][cif_lastseen]" ] }
    } else {
      date {
        id => "date_zeek_intel_cif_lastseen"
        match => [ "[zeek][intel][cif_lastseen]", "UNIX" ]
        target => "[threat][indicator][last_seen]"
        remove_field => [ "[zeek][intel][cif_lastseen]" ]
      }
    }
  }
  if ([zeek][intel][firstseen]) {
    if ([zeek][intel][firstseen] == "0.000000") or ([threat][indicator][first_seen]) {
      mutate { id => "mutate_remove_field_zeek_intel_firstseen_zero"
               remove_field => [ "[zeek][intel][firstseen]" ] }
    } else {
      date {
        id => "date_zeek_intel_firstseen"
        match => [ "[zeek][intel][firstseen]", "UNIX" ]
        target => "[threat][indicator][first_seen]"
        remove_field => [ "[zeek][intel][firstseen]" ]
      }
    }
  }
  if ([zeek][intel][lastseen]) {
    if ([zeek][intel][lastseen] == "0.000000") or ([threat][indicator][last_seen]) {
      mutate { id => "mutate_remove_field_zeek_intel_lastseen_zero"
               remove_field => [ "[zeek][intel][lastseen]" ] }
    } else {
      date {
        id => "date_zeek_intel_lastseen"
        match => [ "[zeek][intel][lastseen]", "UNIX" ]
        target => "[threat][indicator][last_seen]"
        remove_field => [ "[zeek][intel][lastseen]" ]
      }
    }
  }

  if ([zeek][roc_plus_history_point_data][history_timestamps]) {
    ruby {
      id => "ruby_zeek_roc_plus_history_point_data_history_timestamps_convert"
      tag_on_exception => "_rubyexception_zeek_roc_plus_history_point_data_history_timestamps_convert"
      code => "
        field = event.get('[zeek][roc_plus_history_point_data][history_timestamps]')
        if !field.is_a?(Array) then
          field = field.to_s.split(',')
        end
        converted = field.map do |ts|
          begin
            Time.at(ts.to_i).utc.iso8601
          rescue
            nil
          end
        end.compact
        event.set('[zeek][roc_plus_history_point_data][history_timestamps]', converted)
      "
    }
  }

}