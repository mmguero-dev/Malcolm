filter {

  if ([log_source] == "iec104_ctrl") {
    #############################################################################################################################
    # iec104_ctrl.log
    # seq.zeek (https://github.com/cert-lv/spicy-iec104)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_iec104_ctrl"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][is_orig]}	%{[zeek_cols][action]}	%{[zeek_cols][asdu_type]}	%{[zeek_cols][cot]}	%{[zeek_cols][ca]}	%{[zeek_cols][ioa]}	%{[zeek_cols][time_sync]}	%{[zeek_cols][tsc]}	%{[zeek_cols][qrp]}	%{[zeek_cols][actcon_ts]}	%{[zeek_cols][actterm_ts]}	%{[zeek_cols][duration]}	%{[zeek_cols][missing]}	%{[zeek_cols][error]}	%{[zeek_cols][error_reason]}	%{[zeek_cols][status]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_iec104_ctrl"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_iec104_ctrl"
          init => "@zeek_iec104_ctrl_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'is_orig', 'action', 'asdu_type', 'cot', 'ca', 'ioa', 'time_sync', 'tsc', 'qrp', 'actcon_ts', 'actterm_ts', 'duration', 'missing', 'error', 'error_reason', 'status' ]"
          code => "event.set('[zeek_cols]', @zeek_iec104_ctrl_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_iec104_ctrl"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "iec104"
      }

    }
  }


