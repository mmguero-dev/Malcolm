filter {

  if [results][strelka][result] {

    # scanned file tree hierarchy (i.e., from recursive archive file scans)
    if ([results][strelka][result][file][tree][root]) {
      mutate {
        id => "mutate_filescan_add_file_tree_root"
        add_field =>  { "[filescan][tree][root]" => "%{[results][strelka][result][file][tree][root]}" }
      }
    }
    if ([results][strelka][result][file][tree][node]) {
      mutate {
        id => "mutate_filescan_add_file_tree_node"
        add_field =>  { "[filescan][tree][node]" => "%{[results][strelka][result][file][tree][node]}" }
      }
    }
    if ([results][strelka][result][file][tree][parent]) {
      mutate {
        id => "mutate_filescan_add_file_tree_parent"
        add_field =>  { "[filescan][tree][parent]" => "%{[results][strelka][result][file][tree][parent]}" }
      }
    }
    if ([results][strelka][result][file][tree][depth]) {
      mutate {
        id => "mutate_filescan_add_file_tree_depth"
        add_field =>  { "[filescan][tree][depth]" => "%{[results][strelka][result][file][tree][depth]}" }
      }
    }

    # save the filescan's UUID id as into event.id
    if [filescan][tree][node] {
      mutate {
        id => "mutate_merge_event_id_filescan_tree_node"
        merge => { "[event][id]" => "[filescan][tree][node]" }
      }
    } else {
      mutate {
        id => "mutate_merge_event_id_filescan_id"
        merge => { "[event][id]" => "[id]" }
      }
    }

    if ([results][strelka][result][scan][entropy][entropy]) {
      mutate {
        id => "mutate_filescan_add_entropy"
        add_field =>  { "[file][entropy]" => "%{[results][strelka][result][scan][entropy][entropy]}" }
      }
    }

    if ([results][strelka][result][scan][strings][strings]) {
      mutate {
        id => "mutate_filescan_merge_strings"
        merge =>  { "[file][strings]" => "%{[results][strelka][result][scan][strings][strings]}" }
      }
    }

    ruby {
        id => "ruby_filescan_results_processing"
        init => '
          require "yaml"
          @tactic_id_map = YAML.safe_load(File.read("/etc/mitre_attack_tactic_enterprise_ids.yaml"))
          @technique_id_map = YAML.safe_load(File.read("/etc/mitre_attack_technique_enterprise_ids.yaml"))
          @sev_enabled = ENV["LOGSTASH_SEVERITY_SCORING"] || "false";
        '
        code => "
            scanners = Array(event.get('[results][strelka][result][scanners]') || []).compact

            rules = Array(event.get('[results][strelka][result][rules]') || []).compact
            hit_scanners = rules.map { |h| h['scanner'] }.compact.uniq

            event.set('[event][module]', scanners) unless scanners.empty?
            event.set('[rule][ruleset]', hit_scanners) unless hit_scanners.empty?
            event.set('[filescan][hits]', rules.length)
            event.set('[filescan][rules]', rules.map { |h| h.slice('name', 'scanner') }) unless rules.empty?

            if rules.any?
              event.set('[event][kind]', 'alert')
              event.set('[rule][name]', rules.map { |h| h['name'] }.uniq)
              if @sev_enabled.match?(/^(true|t|yes|y|1)$/i)
                sev_tags = []
                sev_tags << 'Signature (ClamAV)' if hit_scanners.include?('clamav')
                sev_tags << 'Signature (YARA)' if hit_scanners.include?('yara')
                sev_tags << 'Signature (capa)' if hit_scanners.include?('capa')
                sev_tags << 'Signature' if sev_tags.empty?
                event.set('[event][severity_tags]', sev_tags)
              end

            else
              event.set('[event][kind]', 'event')
            end

            if hit_scanners.include?('capa')
              tactic_names     = []
              tactic_ids       = []
              tactic_refs      = []
              technique_names  = []
              technique_ids    = []
              technique_refs   = []
              Hash(event.get('[results][strelka][result][scan][capa][rules]') || {}).each do |rule_name, rule|
                meta = rule.is_a?(Hash) ? rule['meta'] : nil
                next unless meta.is_a?(Hash)

                attacks = meta['attack']
                next unless attacks.is_a?(Array)

                attacks.each do |attack|
                  next unless attack.is_a?(Hash)

                  if (tactic = attack['tactic']).is_a?(String)
                    tactic_key = tactic.gsub(/[^A-Za-z0-9]+/, '_')
                    tactic_id  = @tactic_id_map[tactic_key]
                    tactic_names |= [tactic]
                    tactic_ids   |= [tactic_id] if tactic_id
                    tactic_refs  |= [ 'https://attack.mitre.org/tactics/' + tactic_id ] if tactic_id
                  end

                  if (technique = attack['technique']).is_a?(String)
                    technique_key = technique.gsub(/[^A-Za-z0-9]+/, '_')
                    technique_id  = attack['id'] || @technique_id_map[technique_key]
                    technique_names |= [technique]
                    technique_ids   |= [technique_id] if technique_id
                    technique_refs  |= [ 'https://attack.mitre.org/techniques/' + technique_id ] if technique_id
                  end
                end
              end

              event.set('[threat][tactic][name]', tactic_names.uniq) unless tactic_names.empty?
              event.set('[threat][tactic][id]', tactic_ids.uniq) unless tactic_ids.empty?
              event.set('[threat][tactic][reference]', tactic_refs.uniq) unless tactic_refs.empty?
              event.set('[threat][technique][name]', technique_names.uniq) unless technique_names.empty?
              event.set('[threat][technique][id]', technique_ids.uniq) unless technique_ids.empty?
              event.set('[threat][technique][reference]', technique_refs.uniq) unless technique_refs.empty?
              event.set('[threat][framework]', 'MITRE ATT&CK') unless tactic_names.empty?
            end
        "
    }

    # normalize file name/path, mime type, and hashes
    ruby {
      id => "ruby_filescan_normalize_path_mime_and_hashes"
      code => '
        depth = event.get("[filescan][tree][depth]").to_i

        # File path(s) ############################################################################
        paths = depth.positive? ? [] : Array(event.get("[file][path]") || []).compact
          .map { |p| p.to_s.strip.sub(%r{^/zeek/extract_files/}, "") }
          .reject(&:empty?)

        path_fields = [ "[results][strelka][result][file][name]" ]
        path_fields << "[results][strelka][result][request][attributes][filename]" if depth.zero?
        path_fields.each do |p|
          new_paths = Array(event.get(p) || []).compact
            .map { |v| v.to_s.strip.sub(%r{^/zeek/extract_files/}, "") }
            .reject(&:empty?)
          next if new_paths.empty?
          paths |= new_paths
        end
        event.set("[file][path]", paths) unless paths.empty?

        # MIME Type(s) ############################################################################
        mimes = depth.positive? ? [] : Array(event.get("[file][mime_type]") || []).compact.map do |mt|
          mt.to_s.strip.split(";")[0].to_s.strip.downcase
        end.reject(&:empty?)

        mime_fields = [
          "[results][strelka][result][file][mime_type]",
          "[results][strelka][result][scan][exiftool][mime_type]"
        ]
        mime_fields << "[zeek][files][mime_type]" if depth.zero?
        mime_fields.each do |m|
          new_mimes = Array(event.get(m) || []).compact.map do |mt|
            mt.to_s.strip.split(";")[0].to_s.strip.downcase
          end.reject(&:empty?)
          next if new_mimes.empty?
          mimes |= new_mimes
        end
        event.set("[file][mime_type]", mimes) unless mimes.empty?

        # Hashes ##################################################################################
        related_hashes = Array(event.get("[related][hash]") || []).compact
          .map { |v| v.to_s.strip.downcase }
          .reject(&:empty?)

        ["md5", "sha1", "sha256", "ssdeep", "tlsh"].each do |ht|
          hash_field_name = "[file][hash][#{ht}]"
          hash_vals = Array(event.get(hash_field_name) || []).compact
            .map { |v| v.to_s.strip.downcase }
            .reject(&:empty?)

          hash_fields = ["[results][strelka][result][file][hash][#{ht}]"]
          hash_fields << "[zeek][files][#{ht}]" if depth.zero?
          hash_fields.each do |hv|
            new_hash_vals = Array(event.get(hv) || []).compact
              .map { |v| v.to_s.strip.downcase }
              .reject(&:empty?)
            next if new_hash_vals.empty?
            hash_vals |= new_hash_vals
            related_hashes |= new_hash_vals
          end

          event.set(hash_field_name, hash_vals) unless hash_vals.empty?
        end

        event.set("[related][hash]", related_hashes) unless related_hashes.empty?

        # File Size ###############################################################################
        if file_size = (depth.positive? ? event.get("[results][strelka][result][file][size]").to_i : event.get("[file][size]").to_i)
          event.set("[file][size]", file_size)
          event.set("[network][bytes]", file_size)
          event.set("[totDataBytes]", file_size)
        end
      '
    }

  }

}
