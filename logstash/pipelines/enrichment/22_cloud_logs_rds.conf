filter {
  # AWS RDS Logs Parser
  # Supports: RDS Error Logs, Slow Query Logs, Audit Logs (MySQL/PostgreSQL/Aurora)
  # Related: GitHub Issue #232 - Cloud Infrastructure Logs Integration

  if ([event][dataset] == "aws.rds") {

    # Determine RDS log sub-type from tag or path
    # Sub-types: rds.error, rds.slowquery, rds.audit, rds.postgresql

    # -------------------------------------------------------
    # MySQL / Aurora MySQL Error Log
    # -------------------------------------------------------
    if [event][module] == "rds.error" {
      grok {
        id => "grok_rds_error"
        match => {
          "message" => "%{TIMESTAMP_ISO8601:aws.rds.timestamp} %{NUMBER:aws.rds.thread_id} \[%{WORD:log.level}\] %{GREEDYDATA:message_text}"
        }
        tag_on_failure => ["_grokparsefailure_rds_error"]
      }

      date {
        id => "date_rds_error"
        match => ["[aws.rds][timestamp]", "ISO8601"]
        target => "@timestamp"
      }

      mutate {
        id => "mutate_rds_error_meta"
        add_field => {
          "[event][kind]"     => "event"
          "[event][category]" => "database"
          "[event][action]"   => "rds_error"
        }
      }

      # Detect connection errors
      if [message_text] =~ /(?i)(access denied|connection refused|too many connections|authentication failed)/ {
        mutate {
          id => "mutate_rds_auth_failure"
          add_tag => ["db_authentication_failure"]
          add_field => { "[event][outcome]" => "failure" }
        }
      }

      # Detect crash / startup
      if [message_text] =~ /(?i)(crash|corrupt|shutdown|starting up|ready for connections)/ {
        mutate {
          id => "mutate_rds_lifecycle"
          add_tag => ["db_lifecycle_event"]
        }
      }
    }

    # -------------------------------------------------------
    # MySQL / Aurora MySQL Slow Query Log
    # -------------------------------------------------------
    else if [event][module] == "rds.slowquery" {
      grok {
        id => "grok_rds_slowquery"
        match => {
          "message" => [
            "# Time: %{TIMESTAMP_ISO8601:aws.rds.timestamp}",
            "# User@Host: %{DATA:user.name}\[%{DATA}\] @ %{DATA:source.address} \[%{IP:source.ip}\]",
            "# Query_time: %{NUMBER:aws.rds.query_time_sec:float}  Lock_time: %{NUMBER:aws.rds.lock_time_sec:float} Rows_sent: %{NUMBER:aws.rds.rows_sent:int}  Rows_examined: %{NUMBER:aws.rds.rows_examined:int}",
            "%{GREEDYDATA:aws.rds.query}"
          ]
        }
        tag_on_failure => ["_grokparsefailure_rds_slow"]
      }

      if [aws.rds.query_time_sec] {
        ruby {
          id => "ruby_rds_duration"
          code => "
            sec = event.get('[aws.rds][query_time_sec]').to_f
            event.set('[event][duration]', (sec * 1_000_000_000).to_i)
          "
        }
      }

      mutate {
        id => "mutate_rds_slowquery_meta"
        add_field => {
          "[event][kind]"     => "event"
          "[event][category]" => "database"
          "[event][action]"   => "slow_query"
        }
        add_tag => ["slow_db_query"]
      }

      # Flag very slow queries (> 10s)
      if [aws.rds.query_time_sec] and [aws.rds.query_time_sec] > 10 {
        mutate { id => "mutate_rds_very_slow"; add_tag => ["very_slow_db_query"] }
      }

      # Detect potential SQL injection patterns in slow queries
      if [aws.rds.query] =~ /(?i)(union\s+select|information_schema|sleep\s*\(|benchmark\s*\()/ {
        mutate { id => "mutate_rds_sqli"; add_tag => ["potential_sql_injection"] }
      }
    }

    # -------------------------------------------------------
    # MySQL Audit Log (via DATABASE_ACTIVITY_STREAMS or mariadb audit plugin)
    # -------------------------------------------------------
    else if [event][module] == "rds.audit" {
      grok {
        id => "grok_rds_audit"
        match => {
          "message" => "%{NUMBER:aws.rds.timestamp_epoch},%{DATA:source.ip},%{DATA:user.name},%{DATA:aws.rds.db_name},%{WORD:aws.rds.operation},%{DATA:aws.rds.table_name},%{NUMBER:http.response.status_code:int},%{GREEDYDATA:aws.rds.query}"
        }
        tag_on_failure => ["_grokparsefailure_rds_audit"]
      }

      if [aws.rds.timestamp_epoch] {
        date {
          id => "date_rds_audit"
          match => ["[aws.rds][timestamp_epoch]", "UNIX_MS"]
          target => "@timestamp"
        }
      }

      mutate {
        id => "mutate_rds_audit_meta"
        add_field => {
          "[event][kind]"     => "event"
          "[event][category]" => "database"
          "[event][action]"   => "%{[aws.rds][operation]}"
          "[event][type]"     => "access"
        }
      }

      # Classify DDL vs DML
      if [aws.rds.operation] =~ /^(DROP|CREATE|ALTER|TRUNCATE)$/ {
        mutate { id => "mutate_rds_ddl"; add_tag => ["ddl_operation", "high_risk_db_action"] }
      } else if [aws.rds.operation] =~ /^(DELETE|UPDATE|INSERT)$/ {
        mutate { id => "mutate_rds_dml_write"; add_tag => ["dml_write_operation"] }
      } else if [aws.rds.operation] =~ /^(SELECT)$/ {
        mutate { id => "mutate_rds_select"; add_field => { "[event][action]" => "read" } }
      }

      # Detect large result sets
      if [aws.rds.rows_sent] and [aws.rds.rows_sent] > 10000 {
        mutate { id => "mutate_rds_large_result"; add_tag => ["large_db_result_set"] }
      }
    }

    # -------------------------------------------------------
    # PostgreSQL Log
    # -------------------------------------------------------
    else if [event][module] == "rds.postgresql" {
      grok {
        id => "grok_rds_pg"
        match => {
          "message" => "%{TIMESTAMP_ISO8601:aws.rds.timestamp} UTC \[%{NUMBER:aws.rds.pid}\] %{DATA:user.name}@%{DATA:aws.rds.db_name} %{WORD:log.level}:  %{GREEDYDATA:aws.rds.pg_message}"
        }
        tag_on_failure => ["_grokparsefailure_rds_pg"]
      }

      date {
        id => "date_rds_pg"
        match => ["[aws.rds][timestamp]", "ISO8601"]
        target => "@timestamp"
      }

      mutate {
        id => "mutate_rds_pg_meta"
        add_field => {
          "[event][kind]"     => "event"
          "[event][category]" => "database"
        }
      }

      # Detect authentication failures
      if [aws.rds.pg_message] =~ /(?i)(password authentication failed|role .* does not exist|no pg_hba.conf entry)/ {
        mutate { id => "mutate_rds_pg_auth_fail"; add_tag => ["db_authentication_failure"]; add_field => { "[event][outcome]" => "failure" } }
      }

      # Detect statements involving sensitive tables
      if [aws.rds.pg_message] =~ /(?i)(users|passwords|credentials|secrets|api_keys|tokens)/ {
        mutate { id => "mutate_rds_pg_sensitive"; add_tag => ["sensitive_table_access"] }
      }
    }

    # -------------------------------------------------------
    # Shared cloud metadata for all RDS sub-types
    # -------------------------------------------------------
    mutate {
      id => "mutate_rds_cloud"
      add_field => {
        "[cloud][provider]"      => "aws"
        "[cloud][service][name]" => "rds"
      }
    }

    mutate {
      id => "mutate_rds_cleanup"
      remove_field => ["message"]
    }

  } # end if aws.rds
} # end filter
