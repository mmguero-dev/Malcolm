filter {
  # Azure Application Gateway Logs Parser
  # Supports: Access Logs and WAF (Web Application Firewall) Logs
  # Related: GitHub Issue #232 - Cloud Infrastructure Logs Integration

  if ([event][dataset] == "azure.applicationgateway") {

    json {
      id => "json_appgw_parse"
      source => "message"
      target => "azure.appgw"
    }

    # -------------------------------------------------------
    # Access Logs  (category: ApplicationGatewayAccessLog)
    # -------------------------------------------------------
    if [azure.appgw][category] == "ApplicationGatewayAccessLog" {

      # Map ECS fields
      if [azure.appgw][properties][clientIP] {
        mutate { id => "mutate_appgw_src_ip"; add_field => { "[source][ip]" => "%{[azure.appgw][properties][clientIP]}" } }
      }
      if [azure.appgw][properties][clientPort] {
        mutate { id => "mutate_appgw_src_port"; add_field => { "[source][port]" => "%{[azure.appgw][properties][clientPort]}" } }
      }
      if [azure.appgw][properties][httpMethod] {
        mutate { id => "mutate_appgw_method"; add_field => { "[http][request][method]" => "%{[azure.appgw][properties][httpMethod]}" } }
      }
      if [azure.appgw][properties][requestUri] {
        mutate { id => "mutate_appgw_uri"; add_field => { "[url][original]" => "%{[azure.appgw][properties][requestUri]}" } }
      }
      if [azure.appgw][properties][userAgent] {
        mutate { id => "mutate_appgw_ua"; add_field => { "[user_agent][original]" => "%{[azure.appgw][properties][userAgent]}" } }
      }
      if [azure.appgw][properties][httpStatus] {
        mutate { id => "mutate_appgw_status"; add_field => { "[http][response][status_code]" => "%{[azure.appgw][properties][httpStatus]}" } }
        mutate { convert => { "[http][response][status_code]" => "integer" } }
      }
      if [azure.appgw][properties][receivedBytes] {
        mutate { id => "mutate_appgw_bytes_in"; add_field => { "[http][request][bytes]" => "%{[azure.appgw][properties][receivedBytes]}" } }
        mutate { convert => { "[http][request][bytes]" => "integer" } }
      }
      if [azure.appgw][properties][sentBytes] {
        mutate { id => "mutate_appgw_bytes_out"; add_field => { "[http][response][bytes]" => "%{[azure.appgw][properties][sentBytes]}" } }
        mutate { convert => { "[http][response][bytes]" => "integer" } }
      }
      if [azure.appgw][properties][timeTaken] {
        ruby {
          id => "ruby_appgw_duration"
          code => "
            ms = event.get('[azure.appgw][properties][timeTaken]').to_f
            event.set('[event][duration]', (ms * 1_000_000).to_i)
          "
        }
      }

      # Set outcome
      if [http.response.status_code] {
        if [http.response.status_code] >= 200 and [http.response.status_code] < 400 {
          mutate { id => "mutate_appgw_ok"; add_field => { "[event][outcome]" => "success" } }
        } else if [http.response.status_code] == 401 or [http.response.status_code] == 403 {
          mutate { id => "mutate_appgw_unauth"; add_field => { "[event][outcome]" => "failure" }; add_tag => ["unauthorized_access"] }
        } else if [http.response.status_code] >= 500 {
          mutate { id => "mutate_appgw_5xx"; add_field => { "[event][outcome]" => "failure" }; add_tag => ["server_error"] }
        } else {
          mutate { id => "mutate_appgw_4xx"; add_field => { "[event][outcome]" => "failure" }; add_tag => ["client_error"] }
        }
      }

      # Detect slow backend responses (>5s)
      if [event][duration] and [event][duration] > 5000000000 {
        mutate { id => "mutate_appgw_slow"; add_tag => ["slow_backend_response"] }
      }

      mutate {
        id => "mutate_appgw_access_type"
        add_field => {
          "[event][category]" => "web"
          "[event][action]"   => "http_request"
        }
      }
    }

    # -------------------------------------------------------
    # WAF Logs  (category: ApplicationGatewayFirewallLog)
    # -------------------------------------------------------
    else if [azure.appgw][category] == "ApplicationGatewayFirewallLog" {

      if [azure.appgw][properties][clientIp] {
        mutate { id => "mutate_waf_src_ip"; add_field => { "[source][ip]" => "%{[azure.appgw][properties][clientIp]}" } }
      }
      if [azure.appgw][properties][requestUri] {
        mutate { id => "mutate_waf_uri"; add_field => { "[url][original]" => "%{[azure.appgw][properties][requestUri]}" } }
      }

      # WAF action and rule
      if [azure.appgw][properties][action] {
        mutate { id => "mutate_waf_action"; add_field => { "[azure.appgw.waf][action]" => "%{[azure.appgw][properties][action]}" } }
      }
      if [azure.appgw][properties][ruleId] {
        mutate { id => "mutate_waf_rule"; add_field => { "[azure.appgw.waf][rule_id]" => "%{[azure.appgw][properties][ruleId]}" } }
      }
      if [azure.appgw][properties][ruleGroup] {
        mutate { id => "mutate_waf_group"; add_field => { "[azure.appgw.waf][rule_group]" => "%{[azure.appgw][properties][ruleGroup]}" } }
      }
      if [azure.appgw][properties][message] {
        mutate { id => "mutate_waf_msg"; add_field => { "[azure.appgw.waf][message]" => "%{[azure.appgw][properties][message]}" } }
      }

      # Tag by OWASP rule group
      if [azure.appgw.waf][rule_group] {
        if [azure.appgw.waf][rule_group] =~ /(?i)sqli/ {
          mutate { id => "mutate_waf_sqli"; add_tag => ["waf_sqli_detected", "potential_sql_injection"] }
        } else if [azure.appgw.waf][rule_group] =~ /(?i)xss/ {
          mutate { id => "mutate_waf_xss"; add_tag => ["waf_xss_detected"] }
        } else if [azure.appgw.waf][rule_group] =~ /(?i)(lfi|rfi|rce|php)/ {
          mutate { id => "mutate_waf_rce"; add_tag => ["waf_rce_detected", "high_risk_attack"] }
        } else if [azure.appgw.waf][rule_group] =~ /(?i)scanner/ {
          mutate { id => "mutate_waf_scan"; add_tag => ["waf_scanner_detected"] }
        }
      }

      # Blocked vs Detected
      if [azure.appgw.waf][action] == "Blocked" {
        mutate { id => "mutate_waf_blocked"; add_tag => ["waf_blocked"]; add_field => { "[event][outcome]" => "failure" } }
      } else if [azure.appgw.waf][action] == "Detected" {
        mutate { id => "mutate_waf_detected"; add_tag => ["waf_detected"]; add_field => { "[event][outcome]" => "success" } }
      }

      mutate {
        id => "mutate_waf_type"
        add_field => {
          "[event][category]" => "web"
          "[event][action]"   => "waf_event"
          "[event][kind]"     => "alert"
        }
      }
    }

    # Timestamp
    if [azure.appgw][time] {
      date {
        id => "date_appgw"
        match => ["[azure.appgw][time]", "ISO8601"]
        target => "@timestamp"
      }
    }

    # Shared metadata
    mutate {
      id => "mutate_appgw_cloud"
      add_field => {
        "[cloud][provider]"      => "azure"
        "[cloud][service][name]" => "application_gateway"
        "[event][kind]"          => "event"
      }
    }

    if [azure.appgw][resourceId] {
      mutate { id => "mutate_appgw_resource"; add_field => { "[cloud][resource][id]" => "%{[azure.appgw][resourceId]}" } }
    }

    mutate { id => "mutate_appgw_cleanup"; remove_field => ["message"] }

  } # end if azure.applicationgateway
} # end filter
