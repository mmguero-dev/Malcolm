name: valkey-build-and-push-ghcr

on:
  push:
    branches:
      - main
      - valkey
      - staging
    paths:
      - 'Dockerfiles/valkey.Dockerfile'
      - 'container-health-scripts/valkey.sh'
      - 'shared/bin/docker-uid-gid-setup.sh'
      - 'shared/bin/service_check_passthrough.sh'
      - '.trigger_workflow_build'
  workflow_dispatch:
  repository_dispatch:

jobs:
  docker:
    uses: ./.github/workflows/docker-build-push-scan.yml
    with:
      service: valkey
      dockerfile: ./Dockerfiles/valkey.Dockerfile
