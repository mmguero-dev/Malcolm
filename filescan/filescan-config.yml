redis:
  host: ${VALKEY_CACHE_HOST}
  port: ${VALKEY_CACHE_PORT}
  db: ${VALKEY_FILESCAN_CACHE_DATABASE}
  password: ${VALKEY_PASSWORD}

preservation:
  policy: ${FILESCAN_PRESERVATION}
  concurrent_deletes: 8

path_maps:
  /zeek/extract_files: ${ZEEK_EXTRACTOR_PATH}
  /filescan/files: /filescan/data/files

watcher:
  watches:
    - type: redis
      source: zeek
      keys:
        - zeek_notify
      redis:
        host: ${VALKEY_HOST}
        port: ${VALKEY_PORT}
        db: ${VALKEY_ZEEK_FILES_DATABASE}
        password: ${VALKEY_PASSWORD}
    - type: directory
      path: /filescan/data/files
      recursive: true

strelka:
  host: ${STRELKA_HOST}
  port: ${STRELKA_PORT}
  secure: false
